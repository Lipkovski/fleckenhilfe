<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flecken-Notfallhilfe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eef2f7" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

    <button id="darkmode-toggle" aria-label="Farbmodus wechseln">🌓</button>

    <main id="home-view" class="view">
        <header>
            <h1>Flecken-Hilfe</h1>
        </header>

        <form id="filter-form">
            <div class="sentence-container">
                <span class="text-node">Ich habe einen Fleck von</span>
                <div class="select-wrapper">
                    <select id="stain-select" required>
                        <option value="" disabled selected>Fleck auswählen</option>
                        <option value="blut">Blut</option>
                        <option value="kaffee">Kaffee</option>
                    </select>
                </div>
                <span class="text-node">auf dem Material</span>
                <div class="select-wrapper">
                    <select id="material-select" required>
                        <option value="" disabled selected>Material auswählen</option>
                        <option value="baumwolle">Baumwolle</option>
                        <option value="seide">Seide</option>
                    </select>
                </div>
                <span class="text-node">verursacht.</span>
            </div>

            <button type="submit" id="submit-btn">Ich brauche HILFE!</button>
        </form>
    </main>

    <main id="result-view" class="view hidden">
        <div class="results-header">
            <button id="back-btn">← Zurück zur Auswahl</button>
        </div>

        <div id="warning-banner" class="hidden">
            <div class="warning-title">Wichtiger Sicherheitshinweis</div>
            <p id="warning-text"></p>
        </div>

        <div class="result-content">
            <h2>Empfohlene Maßnahmen</h2>
            <div id="solutions-container"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
