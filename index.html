<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flecken-Notfallhilfe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e0e0e0" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

    <!-- Persistent oben rechts -->
    <button id="darkmode-toggle" aria-label="Farbmodus wechseln">🌓</button>

    <!-- STARTSEITE -->
    <main id="home-view" class="view">
        <header>
            <h1>Flecken-Hilfe</h1>
        </header>

        <form id="filter-form">
            <div class="sentence-container">
                <span class="text-node">Verdammt, ich habe</span>
                <div class="select-wrapper">
                    <select id="stain-select" required>
                        <option value="" disabled selected>einen Fleck...</option>
                        <option value="blut">Blut</option>
                        <option value="rotwein">Rotwein</option>
                        <option value="kaffee">Kaffee</option>
                        <option value="fett">Fett / Öl</option>
                        <option value="gras">Gras</option>
                        <option value="tomate">Tomatensauce</option>
                        <option value="kuli">Kugelschreiber</option>
                        <option value="schokolade">Schokolade</option>
                        <option value="wachs">Kerzenwachs</option>
                    </select>
                </div>
                <span class="text-node">auf</span>
                <div class="select-wrapper">
                    <select id="material-select" required>
                        <option value="" disabled selected>ein Material...</option>
                        <option value="baumwolle">Baumwolle / Leinen</option>
                        <option value="wolle">Wolle</option>
                        <option value="seide">Seide</option>
                        <option value="synthetik">Synthetik / Polyester</option>
                        <option value="teppich">Teppich / Polster</option>
                        <option value="jeans">Jeans / Denim</option>
                    </select>
                </div>
                <span class="text-node">gekippt!</span>
            </div>

            <button type="submit" id="submit-btn">Ich brauche HILFE!</button>
        </form>
    </main>

    <!-- ERGEBNISSEITE -->
    <main id="result-view" class="view hidden">
        <div class="results-header">
            <button id="back-btn">← Zurück zur Auswahl</button>
        </div>

        <div id="warning-banner" class="hidden">
            <div class="warning-title">Wichtig!</div>
            <p id="warning-text"></p>
        </div>

        <div class="result-content">
            <h2>Deine Sofortmaßnahmen:</h2>
            <div id="solutions-container"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
